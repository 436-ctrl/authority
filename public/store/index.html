<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var currentUrl = new URL(window.location.href);
        var pathname = currentUrl.pathname.replace(/index\.html$/, "").replace(/\/+$/, "");
        var rootPath = pathname.endsWith("/store") ? pathname.slice(0, -"/store".length) || "/" : "/";
        var redirectUrl = new URL(rootPath + (rootPath.endsWith("/") ? "" : "/"), currentUrl.origin);

        redirectUrl.searchParams.set("view", "store");

        var master = currentUrl.searchParams.get("master");
        if (master) {
          redirectUrl.searchParams.set("master", master);
        }

        window.location.replace(redirectUrl.pathname + redirectUrl.search + redirectUrl.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
